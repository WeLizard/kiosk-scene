worker_processes 1;

error_log /dev/stderr notice;

events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  access_log /dev/stdout;
  error_log /dev/stderr notice;

  sendfile on;
  keepalive_timeout 65;

  server {
    listen 48123;

    location = /health {
      proxy_pass http://127.0.0.1:48097/health;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /scene-editor {
      return 302 scene-editor/;
    }

    location = /scene-editor/ {
      add_header Cache-Control "no-store" always;
      return 302 ../scene-runtime/?editor=1&v=$msec;
    }

    location ^~ /scene-editor-form/ {
      proxy_pass http://127.0.0.1:48098;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    location = /scene {
      return 302 scene/;
    }

    location = /scene/ {
      add_header Cache-Control "no-store" always;
      return 302 ../scene-runtime/?v=$msec;
    }

    location ^~ /scene-api/ {
      proxy_pass http://127.0.0.1:48097;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    location ^~ /scene-runtime/ {
      add_header Cache-Control "no-store" always;
      root /config/kiosk-scene;
      index index.html;
      try_files $uri $uri/ /scene-runtime/index.html;
    }

    location ^~ /scene-legacy/live2d/ {
      add_header Cache-Control "no-store" always;
      alias /config/www/live2d/;
    }

    location ^~ /scene-packs/ {
      root /config/kiosk-scene;
      try_files $uri =404;
    }

    location = / {
      root /opt/kiosk-scene/www;
      default_type text/html;
      try_files /index.html =404;
    }

    location / {
      return 404;
    }
  }
}
